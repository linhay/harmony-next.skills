name: Release Skill

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package Skill
        run: |
          cd harmony-next
          zip -r ../harmony-next.skill .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: harmony-next.skill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
